<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AspexTopia | Shine Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: rgba(173, 216, 230, 0.9);
            --primary-glow: rgba(173, 216, 230, 0.5);
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-card-bg: rgba(15, 15, 15, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: 0.8s;
            backdrop-filter: blur(20px);
        }

        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a1b2e 0%, #050505 100%);
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 480px;
            margin: 40px auto;
            padding-bottom: 100px;
        }

        .glass-card {
            background: var(--glass-card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(173, 216, 230, 0.15);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        .main-header { text-align: center; border-bottom: 3px solid var(--primary); }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px var(--primary-glow);
        }

        /* Server Stats Indicator */
        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 50px;
            margin-top: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #status-dot {
            height: 12px; width: 12px; border-radius: 50%;
            margin-right: 10px;
            transition: 0.5s ease;
            background: gray; /* Default */
        }

        /* Color States */
        .dot-online { background: #00ff88 !important; box-shadow: 0 0 15px #00ff88; }
        .dot-offline { background: #ff0055 !important; box-shadow: 0 0 15px #ff0055; }
        .dot-maintenance { background: #ffaa00 !important; box-shadow: 0 0 15px #ffaa00; }

        #music-control {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: var(--primary);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 20px var(--primary-glow);
            z-index: 100;
            transition: 0.3s;
            font-size: 1.4rem;
        }

        .section-title {
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: var(--primary);
            margin-bottom: 25px;
            text-align: center;
            font-weight: 700;
        }

        .staff-card {
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(173, 216, 230, 0.1);
            padding: 15px 20px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .vip { border-color: gold !important; }

        .htp-item {
            background: rgba(20, 20, 20, 0.6);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(173, 216, 230, 0.05);
        }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
        }

        .btn-download {
            background: linear-gradient(45deg, var(--primary), rgba(255,255,255,0.8));
            color: #002244;
        }

        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-social { background: transparent; border: 2px solid var(--primary); color: var(--primary); font-size: 0.8rem; }
        .btn-wa { border-color: #25d366; color: #25d366; }

        .htp-btn { background: rgba(173, 216, 230, 0.1); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: #000; padding: 12px 24px;
            border-radius: 50px; font-weight: bold; z-index: 1000; opacity: 0; transition: 0.3s;
        }
        #toast.show { opacity: 1; top: 30px; }
    </style>
</head>
<body>

    <div id="toast">Copied to clipboard!</div>

    <div id="overlay">
        <h1 class="logo-text" style="font-size: 3rem; margin-bottom: 30px;">ASPEXTOPIA</h1>
        <button onclick="startPortal()" class="btn btn-download" style="width: 240px;">ENTER PORTAL</button>
    </div>

    <div class="bg-animate"></div>

    <audio id="myAudio" loop prelaod="auto">
        <source src="https://www.image2url.com/r2/default/audio/1777973249472-c81569ed-a538-497b-87cb-ad7b22e6ed7f.m4a" type="audio/mp4">
    </audio>

    <div id="music-control" onclick="toggleMusic()">
        <span id="music-icon">🎵</span>
    </div>

    <div class="container">
        <div class="glass-card main-header">
            <h1 class="logo-text">ASPEXTOPIA</h1>
            <div class="status-badge">
                <div id="status-dot"></div>
                <span id="status-text">CONNECTING</span>
            </div>
            <p style="margin-top: 18px; font-size: 1.3rem;">
                ONLINE: <span id="online-count" style="color: var(--primary); font-weight: bold; font-family: 'Orbitron';">0</span>
            </p>
        </div>

        <div class="glass-card">
            <h2 class="section-title">Hierarchy</h2>
            <div style="margin-bottom: 15px;">
                <span style="font-size: 0.7rem; opacity: 0.5; display: block; margin-bottom: 5px;">FOUNDER</span>
                <div class="staff-card vip">
                    <div style="font-family: 'Orbitron'; font-weight: bold;">SHINE</div>
                </div>
            </div>
        </div>

        <div class="glass-card">
            <h2 class="section-title">How To Play</h2>
            <div class="htp-item">
                <div>PowerTunnel</div>
                <button class="htp-btn" onclick="copyText('https://gtpshost.com/raw/AspexTopia')">Copy</button>
            </div>
        </div>

        <div class="action-area">
            <a href="#" class="btn btn-download">Download APK (Soon)</a>
            <div class="social-grid">
                <a href="#" class="btn btn-social btn-discord">Discord</a>
                <a href="#" class="btn btn-social btn-wa">WhatsApp</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.gtps.cloud/server/2934';
        const audio = document.getElementById("myAudio");
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        const count = document.getElementById('online-count');
        const toast = document.getElementById('toast');

        function startPortal() {
            document.getElementById("overlay").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("overlay").style.display = "none";
                audio.play().catch(() => {});
            }, 800);
        }

        function toggleMusic() {
            if (audio.paused) { audio.play(); document.getElementById("music-icon").innerText = "🎵"; }
            else { audio.pause(); document.getElementById("music-icon").innerText = "🔇"; }
        }

        function copyText(val) {
            navigator.clipboard.writeText(val).then(() => {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        }

        async function updateStatus() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Logic Bulat Berwarna
                if (data.status === "online") {
                    dot.className = 'dot-online';
                    text.innerText = "ONLINE";
                    text.style.color = "#00ff88";
                    count.innerText = data.players || 0;
                } else if (data.status === "maintenance") {
                    dot.className = 'dot-maintenance';
                    text.innerText = "MAINTENANCE";
                    text.style.color = "#ffaa00";
                    count.innerText = "0";
                } else {
                    dot.className = 'dot-offline';
                    text.innerText = "OFFLINE";
                    text.style.color = "#ff0055";
                    count.innerText = "0";
                }
            } catch (err) { 
                text.innerText = "API ERROR"; 
                dot.className = 'dot-offline';
            }
        }

        setInterval(updateStatus, 1000);
        updateStatus();
    </script>
</body>
</html>
