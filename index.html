<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AspexTopia - Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f0f9ff; 
            --card-bg: #ffffff;
            --accent-color: #00a8ff; 
            --text-main: #2d3436;
            --text-dim: #636e72;
            --border-radius: 20px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #e0f2fe 0%, #ffffff 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 450px; }

        .header { text-align: center; margin-bottom: 25px; }
        .header img {
            width: 200px; 
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(0, 168, 255, 0.2));
        }

        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; transition: 0.3s; }
        .dot-up { background-color: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
        .dot-down { background-color: #e74c3c; box-shadow: 0 0 8px #e74c3c; }
        .dot-maint { background-color: #f1c40f; box-shadow: 0 0 8px #f1c40f; }

        .status-text-small { display: block; font-size: 0.7rem; margin-top: 5px; font-weight: bold; text-transform: uppercase; }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 800; color: var(--accent-color); display: block; }
        .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }

        .staff-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; }
        .staff-item:last-child { border: none; }
        .role { font-weight: bold; color: var(--text-main); font-size: 0.9rem; }
        .name { color: var(--accent-color); font-weight: 600; font-size: 0.9rem; }

        .section-title { font-size: 1rem; margin: 20px 0 12px 5px; display: flex; align-items: center; gap: 8px; font-weight: 700; color: #2c3e50; }

        .host-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f8f9fa; }
        .host-info { display: flex; align-items: center; gap: 12px; }
        .host-icon { color: var(--accent-color); font-size: 1.1rem; width: 20px; }
        .host-text h4 { margin: 0; font-size: 0.9rem; }
        .host-text p { margin: 0; font-size: 0.7rem; color: var(--text-dim); }

        .btn-action { background: var(--accent-color); color: white; border: none; padding: 6px 16px; border-radius: 10px; font-size: 0.75rem; font-weight: bold; cursor: pointer; text-decoration: none; }

        .starterpack-img { width: 100%; border-radius: 12px; display: block; }

        .community-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .com-link { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 12px; text-decoration: none; color: white; font-weight: bold; font-size: 0.85rem; }
        .discord { background: #5865F2; }
        .whatsapp { background: #25D366; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="game_title.png" alt="AspexTopia Logo">
        </div>

        <div class="card">
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">Server Statistic</span>
                    <div style="margin-top: 8px;">
                         <span id="main-dot" class="dot dot-down"></span>
                         <span id="main-status-text" class="status-text-small" style="color: #e74c3c;">Offline</span>
                    </div>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Player Online</span>
                    <span id="player-online" class="stat-value">0/500</span>
                </div>
            </div>
        </div>

        <div class="section-title"><i class="fas fa-shield-alt"></i> Server Staff</div>
        <div class="card">
            <div class="staff-item">
                <span class="role">Founders</span>
                <span class="name">Shine</span>
            </div>
            <div class="staff-item">
                <span class="role">Co Founders</span>
                <span class="name">Tak Isi Sendiri</span>
            </div>
        </div>

        <div class="section-title"><i class="fas fa-gamepad"></i> How To Play</div>
        <div class="card">
            <div class="host-item">
                <div class="host-info"><i class="fas fa-bolt host-icon"></i><div class="host-text"><h4>PowerTunnel</h4><p>Android</p></div></div>
                <button class="btn-action" onclick="copyHost('aspextopia.site')">Copy</button>
            </div>
            <div class="host-item">
                <div class="host-info"><i class="fab fa-apple host-icon"></i><div class="host-text"><h4>Surge 5</h4><p>iOS</p></div></div>
                <button class="btn-action" onclick="copyHost('aspextopia.site')">Copy</button>
            </div>
            <div class="host-item">
                <div class="host-info"><i class="fas fa-link host-icon"></i><div class="host-text"><h4>Virtual Host</h4><p>Download Host/ Link</p></div></div>
                <a href="#" class="btn-action" style="background:#00cec9">Open</a>
            </div>
            <div class="host-item">
                <div class="host-info"><i class="fab fa-windows host-icon"></i><div class="host-text"><h4>Windows Hosts</h4><p>PC / Laptop</p></div></div>
                <button class="btn-action" onclick="copyHost('aspextopia.site')">Copy</button>
            </div>
        </div>

        <div class="section-title"><i class="fas fa-box-open"></i> Starterpack New Player</div>
        <div class="card" style="padding: 10px;">
            <img src="newget.png" alt="Starterpack" class="starterpack-img">
        </div>

        <div class="section-title"><i class="fas fa-users"></i> Community Aspex Topia</div>
        <div class="community-grid">
            <a href="#" class="com-link discord"><i class="fab fa-discord"></i> Discord</a>
            <a href="#" class="com-link whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        </div>
    </div>

    <script>
        function copyHost(text) {
            navigator.clipboard.writeText(text).then(() => alert("Copied!"));
        }

        async function updateStats() {
            const playerEl = document.getElementById('player-online');
            const dotEl = document.getElementById('main-dot');
            const textEl = document.getElementById('main-status-text');

            const SERVER_ID = "2934";
            const mainApiUrl = `https://api.gtps.cloud/api/server/public/${SERVER_ID}`;
            const statusApiUrl = `https://api.gtps.cloud/g-api/${SERVER_ID}/status`;

            try {
                // Fetch All data via Proxy
                const [resMain, resStatus] = await Promise.all([
                    fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(mainApiUrl)).then(r => r.json()),
                    fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(statusApiUrl)).then(r => r.json())
                ]);

                const data = JSON.parse(resMain.contents);
                const statusStr = resStatus.contents.toLowerCase();

                // Logic Player Online
                if(data && data.online !== undefined) {
                    playerEl.innerText = `${data.online}/${data.max_online || 500}`;
                } else if (data && data.players_online !== undefined) {
                    playerEl.innerText = `${data.players_online}/${data.max_players || 500}`;
                }

                // Logic Dot Status
                if (statusStr.includes('online') || statusStr.includes('up') || statusStr.includes('1')) {
                    dotEl.className = "dot dot-up";
                    textEl.innerText = "Online";
                    textEl.style.color = "#2ecc71";
                } else if (statusStr.includes('maint')) {
                    dotEl.className = "dot dot-maint";
                    textEl.innerText = "Maintenance";
                    textEl.style.color = "#f1c40f";
                } else {
                    dotEl.className = "dot dot-down";
                    textEl.innerText = "Offline";
                    textEl.style.color = "#e74c3c";
                }

            } catch (error) {
                console.log("Fetch Error, using offline display");
                playerEl.innerText = "0/500";
                dotEl.className = "dot dot-down";
                textEl.innerText = "Offline";
                textEl.style.color = "#e74c3c";
            }
        }

        updateStats();
        setInterval(updateStats, 15000); // Update tiap 15 detik
    </script>
</body>
</html>
