<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AspexTopia - Official Website</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f0f9ff; 
            --card-bg: #ffffff;
            --accent-color: #00a8ff; 
            --text-main: #2d3436;
            --text-dim: #636e72;
            --border-radius: 20px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #e0f2fe 0%, #ffffff 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 450px; }

        /* --- Header Logo --- */
        .header { text-align: center; margin-bottom: 25px; }
        .header img {
            width: 300px; 
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(0, 168, 255, 0.2));
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-top: 10px;
        }

        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; transition: 0.3s; }
        .dot-up { background-color: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
        .dot-down { background-color: #e74c3c; box-shadow: 0 0 8px #e74c3c; }
        .dot-maint { background-color: #f1c40f; box-shadow: 0 0 8px #f1c40f; }

        /* --- Cards --- */
        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 800; color: var(--accent-color); display: block; }
        .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }

        /* --- Staff Section --- */
        .staff-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
        }
        .staff-item:last-child { border: none; }
        .role { font-weight: bold; color: var(--text-main); font-size: 0.9rem; }
        .name { color: var(--accent-color); font-weight: 600; font-size: 0.9rem; }

        /* --- Section Titles --- */
        .section-title {
            font-size: 1rem;
            margin: 20px 0 12px 5px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            color: #2c3e50;
        }

        /* --- Connection Hosts --- */
        .host-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f8f9fa;
        }
        .host-info { display: flex; align-items: center; gap: 12px; }
        .host-icon { color: var(--accent-color); font-size: 1.1rem; width: 20px; }
        .host-text h4 { margin: 0; font-size: 0.9rem; }
        .host-text p { margin: 0; font-size: 0.7rem; color: var(--text-dim); }

        .btn-action {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        /* --- Starterpack --- */
        .starterpack-img { width: 100%; border-radius: 12px; display: block; }

        /* --- Community --- */
        .community-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .com-link {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 12px; border-radius: 12px; text-decoration: none; color: white; font-weight: bold; font-size: 0.85rem;
        }
        .discord { background: #5865F2; }
        .whatsapp { background: #25D366; }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header">
            <img src="game_title.png" alt="AspexTopia">
            <div class="status-badge">
                <span id="status-dot-top" class="dot"></span>
                <span id="status-text-top">Connecting...</span>
            </div>
        </div>

        <div class="card">
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">Server Statistic</span>
                    <div id="status-indicator-main" style="margin-top: 5px;">
                         <span class="dot"></span>
                    </div>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Player Online</span>
                    <span id="player-online" class="stat-value">0/500</span>
                </div>
            </div>
        </div>

        <div class="section-title"><i class="fas fa-shield-alt"></i> Server Date</div>
        <div class="card">
            <div class="staff-item">
                <span class="role">FOUNDES</span>
                <span class="name">Shine</span>
                <span class="description">Discord : @shinegengsta</span>
            </div>
            <div class="staff-item">
                <span class="role">CO FOUNDERS</span>
                <span class="name">-</span>
            </div>
        </div>

        <div class="section-title"><i class="fas fa-gamepad"></i> How To Play</div>
        <div class="card">
            <div class="host-item">
                <div class="host-info">
                    <i class="fas fa-bolt host-icon"></i>
                    <div class="host-text"><h4>PowerTunnel</h4><p>Android</p></div>
                </div>
                <button class="btn-action" onclick="copyHost('https://gtpshost.com/raw/AspexTopia')">Copy</button>
            </div>
            <div class="host-item">
                <div class="host-info">
                    <i class="fab fa-apple host-icon"></i>
                    <div class="host-text"><h4>Surge 5</h4><p>iOS</p></div>
                </div>
                <button class="btn-action" onclick="copyHost('https://gtpshost.com/ios/AspexTopia')">Copy</button>
            </div>
            <div class="host-item">
                <div class="host-info">
                    <i class="fas fa-link host-icon"></i>
                    <div class="host-text"><h4>Virtual Host</h4><p>Download Host/ Link</p></div>
                </div>
                <a href="LINK_URL_HOST" class="btn-action" style="background:#00cec9">Open</a>
            </div>
            <div class="host-item">
                <div class="host-info">
                    <i class="fab fa-windows host-icon"></i>
                    <div class="host-text"><h4>Windows Hosts</h4><p>PC / Laptop</p></div>
                </div>
                <button class="btn-action" onclick="copyHost('91.134.85.13 growtopia1.com 91.134.85.13 growtopia2.com 91.134.85.13 www.growtopia1.com 91.134.85.13 www.growtopia2.com')">Copy</button>
            </div>
        </div>

        <div class="section-title"><i class="fas fa-box-open"></i> Starterpack New Player</div>
        <div class="card" style="padding: 10px;">
            <img src="newget.png" alt="Starterpack" class="starterpack-img">
        </div>

        <div class="section-title"><i class="fas fa-users"></i> Community Aspex Topia</div>
        <div class="community-grid">
            <a href="LINK_DISCORD" class="com-link discord"><i class="fab fa-discord"></i> Discord</a>
            <a href="LINK_WA" class="com-link whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</a>
        </div>

    </div>

    <script>
        function copyHost(text) {
            navigator.clipboard.writeText(text).then(() => alert("Copied: " + text));
        }

        async function updateStats() {
            try {
                // Fetch Data Main (Online Players)
                const responseMain = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.gtps.cloud/api/server/public/20034'));
                const jsonMain = await responseMain.json();
                const data = JSON.parse(jsonMain.contents);

                if(data) {
                    document.getElementById('player-online').innerText = `${data.online}/${data.max_online || 500}`;
                }

                // Fetch Data Status
                const responseStatus = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.gtps.cloud/g-api/20034/status'));
                const jsonStatus = await responseStatus.json();
                const statusStr = jsonStatus.contents.toLowerCase();

                const topDot = document.getElementById('status-dot-top');
                const mainIndicator = document.getElementById('status-indicator-main');
                const topText = document.getElementById('status-text-top');

                if (statusStr.includes('online')) {
                    setTheme('dot-up', 'Server is Online');
                } else if (statusStr.includes('maint')) {
                    setTheme('dot-maint', 'Maintenance');
                } else {
                    setTheme('dot-down', 'Server Offline');
                }

                function setTheme(cls, txt) {
                    topDot.className = `dot ${cls}`;
                    mainIndicator.innerHTML = `<span class="dot ${cls}"></span>`;
                    topText.innerText = txt;
                }

            } catch (error) {
                console.error("API Error:", error);
            }
        }

        // Jalankan update
        updateStats();
        // Update setiap 10 detik
        setInterval(updateStats, 10000);
    </script>
</body>
</html>
