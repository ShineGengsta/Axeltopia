<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTPS Server Status - Growice</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Warna yang kamu minta: Powder Blue (176, 224, 230) */
            --primary-color: rgb(176, 224, 230); 
            --bg-body: rgb(176, 224, 230);
            --card-bg: #111111;
            --inner-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        body {
            background-color: var(--bg-body);
            margin: 0;
            padding: 20px;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background-color: var(--card-bg);
            border: 2px solid var(--primary-color);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            color: var(--text-main);
        }

        .logo-box {
            margin-bottom: 30px;
        }

        .logo-box img {
            max-width: 80%;
            height: auto;
        }

        /* Server Card */
        .server-status-card {
            background: var(--inner-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
        }

        .status-dot {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }
        .online-dot { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        .offline-dot { background: #e74c3c; box-shadow: 0 0 10px #e74c3c; }

        .player-count {
            font-size: 42px;
            font-weight: 700;
            margin: 10px 0;
            color: var(--primary-color);
        }

        .label {
            color: var(--text-dim);
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* How to Play */
        .how-to-play {
            text-align: left;
            background: rgba(255,255,255,0.02);
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 30px;
            border-left: 4px solid var(--primary-color);
        }

        .how-to-play h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: var(--primary-color);
        }

        .how-to-play p {
            margin: 5px 0;
            font-size: 13px;
            color: #ccc;
        }

        /* Social Buttons */
        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .discord { background: #5865F2; }
        .whatsapp { background: #25D366; }
        .social-btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="game_title.png" alt="Server Logo" onerror="this.src='https://via.placeholder.com/250x100?text=GAME+LOGO'">
        </div>

        <div class="server-status-card">
            <div id="status-badge" class="status-dot">
                <span id="dot-color" class="dot offline-dot"></span> 
                <span id="status-text">OFFLINE</span>
            </div>
            <div id="online-players" class="player-count">0</div>
            <div class="label">Players Online</div>
        </div>

        <div class="how-to-play">
            <h3>Cara Main:</h3>
            <p>1. Buka Client GTPS kamu</p>
            <p>2. Masukkan Host: <b>dash.gtps.cloud</b></p>
            <p>3. Masukkan Port: <b>2934</b></p>
        </div>

        <div class="social-grid">
            <a href="https://discord.gg/yourlink" class="social-btn discord">Discord</a>
            <a href="https://wa.me/yourlink" class="social-btn whatsapp">WhatsApp</a>
        </div>

        <p style="margin-top: 30px; font-size: 10px; color: #444;">&copy; 2024 GROWICE - GTPS Cloud Integration</p>
    </div>

    <script>
        // ID Server kamu dari link yang diberikan
        const SERVER_ID = "2934";
        const API_URL = `https://api.gtps.cloud/server/${SERVER_ID}`;

        async function fetchStats() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if(data.success) {
                    const server = data.server;
                    document.getElementById('online-players').innerText = server.onlinePlayers || 0;
                    
                    if(server.status === "online") {
                        document.getElementById('status-text').innerText = "ONLINE";
                        document.getElementById('dot-color').className = "dot online-dot";
                    } else {
                        document.getElementById('status-text').innerText = "OFFLINE";
                        document.getElementById('dot-color').className = "dot offline-dot";
                    }
                }
            } catch (error) {
                console.error("Gagal mengambil data API:", error);
            }
        }

        // Jalankan saat halaman dibuka
        fetchStats();
        // Auto refresh setiap 30 detik
        setInterval(fetchStats, 30000);
    </script>
</body>
</html>
