<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AspexTopia - GTPS Server</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            /* Warna Tema Baru: Snow/Light Blue */
            --bg-color: #e0f2f7; 
            --card-bg: rgba(255, 255, 255, 0.8);
            --accent-color: #4facfe; 
            --text-main: #2c3e50;
            --text-dim: #5d6d7e;
            --border-radius: 20px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0f2f7 0%, #ffffff 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header img {
            width: 140px;
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(79, 172, 254, 0.3));
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-item { text-align: center; }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--accent-color);
            display: block;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .section-title {
            font-size: 1.1rem;
            margin: 25px 0 15px 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            color: #34495e;
        }

        .host-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.6);
            padding: 14px 18px;
            border-radius: 15px;
            margin-bottom: 12px;
            border: 1px solid #f0f0f0;
        }

        .host-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .host-icon {
            font-size: 1.3rem;
            color: var(--accent-color);
            width: 25px;
            text-align: center;
        }

        .host-text h4 { margin: 0; font-size: 0.95rem; }
        .host-text p { margin: 2px 0 0 0; font-size: 0.75rem; color: var(--text-dim); }

        .btn-copy, .btn-link {
            background: var(--accent-color);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }

        .btn-link {
            background: #00c6ff;
        }

        .community-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .com-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .discord { background: #5865F2; }
        .whatsapp { background: #25D366; }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header">
            <img src="game_title.png" alt="AspexTopia Logo">
            <p style="color: var(--text-dim); font-size: 0.85rem; margin-top: 10px;">
                <i class="fas fa-circle" style="color: #25D366; font-size: 8px;"></i> Real-time server status
            </p>
        </div>

        <div class="card">
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">Server Load</span>
                    <span id="server-load" class="stat-value">0.4%</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Player Online</span>
                    <span id="player-online" class="stat-value">37/500</span>
                </div>
            </div>
        </div>

        <div class="section-title">
            <i class="fas fa-gamepad" style="color: var(--accent-color);"></i> How To Play
        </div>
        <div class="card">
            
            <div class="host-item">
                <div class="host-info">
                    <i class="fas fa-bolt host-icon"></i>
                    <div class="host-text">
                        <h4>PowerTunnel</h4>
                        <p>Android</p>
                    </div>
                </div>
                <button class="btn-copy" onclick="copyHost('ISI_HOST_DI_SINI')">Copy</button>
            </div>

            <div class="host-item">
                <div class="host-info">
                    <i class="fab fa-apple host-icon"></i>
                    <div class="host-text">
                        <h4>Surge 5</h4>
                        <p>iOS</p>
                    </div>
                </div>
                <button class="btn-copy" onclick="copyHost('ISI_HOST_DI_SINI')">Copy</button>
            </div>

            <div class="host-item">
                <div class="host-info">
                    <i class="fas fa-link host-icon"></i>
                    <div class="host-text">
                        <h4>Virtual Host</h4>
                        <p>Download Host/ Link</p>
                    </div>
                </div>
                <a href="MASUKKAN_URL_DI_SINI" class="btn-link">Open</a>
            </div>

            <div class="host-item">
                <div class="host-info">
                    <i class="fab fa-windows host-icon"></i>
                    <div class="host-text">
                        <h4>Windows Hosts</h4>
                        <p>PC / Laptop</p>
                    </div>
                </div>
                <button class="btn-copy" onclick="copyHost('ISI_HOST_DI_SINI')">Copy</button>
            </div>

        </div>

        <div class="section-title">
            <i class="fas fa-users" style="color: var(--accent-color);"></i> Community Aspex Topia
        </div>
        <div class="community-grid">
            <a href="LINK_DISCORD" class="com-link discord">
                <i class="fab fa-discord"></i> Discord
            </a>
            <a href="LINK_WA" class="com-link whatsapp">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
        </div>

    </div>

    <script>
        function copyHost(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("Host disalin: " + text);
            });
        }
    </script>

</body>
</html>
