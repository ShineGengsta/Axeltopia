<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxelTopia - Official Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-black: #000000;
            --main-red: #780000;
            --neon-red: #ff0000;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 0, 0, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-black);
            background-image: linear-gradient(rgba(139, 0, 0, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(139, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff; display: flex; justify-content: center; min-height: 100vh; padding: 20px;
        }

        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .container { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 20px; z-index: 5; }

        .m-control {
            position: fixed; top: 20px; right: 20px; background: var(--main-red);
            border: 2px solid #fff; width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 0 20px var(--neon-red); z-index: 1000;
        }

        .header { text-align: center; }
        .logo-img { width: 180px; filter: drop-shadow(0 0 15px var(--main-red)); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .glow-title { font-family: 'Orbitron', sans-serif; font-size: 30px; background: linear-gradient(#fff, #ff0000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 4px; }

        .card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 22px; padding: 20px; box-shadow: 0 0 15px rgba(255,0,0,0.1); }
        .tag { font-size: 10px; font-weight: 900; color: var(--neon-red); text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; letter-spacing: 1px; }

        /* Stats */
        .stat-flex { display: flex; justify-content: space-between; align-items: center; }
        .online-val { font-size: 32px; font-weight: 900; text-shadow: 0 0 15px var(--neon-red); }

        /* Staff (GAK ILANG LAGI) */
        .staff-box { display: flex; align-items: center; gap: 12px; background: rgba(255,0,0,0.05); padding: 12px; border-radius: 16px; margin-bottom: 10px; border-left: 3px solid var(--neon-red); }
        .pfp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fff; }
        .role { font-size: 8px; background: #fff; color: #000; padding: 2px 8px; border-radius: 4px; font-weight: 900; margin-left: 5px; }

        /* How To Play (IOS BALIK LAGI BANGSAT) */
        .how-item { background: rgba(0,0,0,0.4); padding: 14px; border-radius: 16px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .action-btn { width: 100%; padding: 10px; border-radius: 10px; font-weight: 900; border: none; font-size: 11px; cursor: pointer; transition: 0.3s; margin-top: 8px; }
        .btn-copy { background: var(--main-red); color: #fff; }
        .btn-open { background: #fff; color: #000; }

        /* Social */
        .soc-row { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 18px; text-decoration: none; color: #fff; margin-bottom: 10px; border: 1px solid var(--border); }
        .fa-whatsapp { color: #25d366; }
        .fa-discord { color: #5865f2; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop><source src="https://www.image2url.com/r2/default/audio/1778740326621-854fe3ca-f8d2-4db9-896b-2397cd02fb94.m4a" type="audio/mpeg"></audio>

    <div class="m-control" onclick="toggleM()">
        <i id="mIco" class="fas fa-play"></i>
    </div>

    <div class="container">
        <div class="header">
            <img src="game_title.png" class="logo-img">
            <h1 class="glow-title">AxelTopia</h1>
        </div>

        <!-- 1. Stats -->
        <div class="card">
            <div class="stat-flex">
                <div>
                    <span class="tag"><i class="fas fa-microchip"></i> System Statistic</span>
                    <p id="stLabel" style="font-weight: 900; color: #444;">SYNCING...</p>
                </div>
                <div style="text-align: right;">
                    <p id="onVal" class="online-val">0</p>
                    <small style="font-size: 9px; font-weight: 900; color: var(--neon-red);">CITIZENS ONLINE</small>
                </div>
            </div>
        </div>

        <!-- 2. Team Management -->
        <div class="card">
            <span class="tag"><i class="fas fa-user-shield"></i> Team Management</span>
            <div class="staff-box">
                <img src="https://cdn.discordapp.com/attachments/1503531185807032320/1504371154364792923/7f0a7aaf9839df52091d29b2604e1932.jpg?ex=6a06be51&is=6a056cd1&hm=b22c66f8a1416197bcbd30f3bdd69ac079fc015b65908b81590e055062a7ffba&" class="pfp">
                <div class="description">Discord:@shinegengsta</span></div>
                <div><p style="font-weight: 800;">shine <span class="role">Founders</span></p></div>
            </div>
            <div class="staff-box">
                <img src="LINK_FOTO_EMPTY" class="pfp">
                <div><p style="font-weight: 800;">Empty <span class="role" style="background:#333; color:#fff;">Co-Founders</span></p></div>
            </div>
        </div>

        <!-- 3. How To Play (IOS, ANDROID, PC, VH LENGKAP!) -->
        <div class="card">
            <span class="tag"><i class="fas fa-terminal"></i> How To Play</span>
            
            <div class="how-item">
                <p style="font-size:12px; font-weight:700;"><i class="fab fa-android"></i> Android (PowerTunnel)</p>
                <button class="action-btn btn-copy" onclick="copy('IP_ANDA')">COPY HOST</button>
            </div>

            <div class="how-item">
                <p style="font-size:12px; font-weight:700;"><i class="fab fa-apple"></i> iOS (Surge 5)</p>
                <button class="action-btn btn-copy" onclick="copy('IP_ANDA')">COPY HOST</button>
            </div>

            <div class="how-item">
                <p style="font-size:12px; font-weight:700;"><i class="fas fa-globe"></i> Virtual Host (No Root)</p>
                <button class="action-btn btn-open" onclick="window.open('LINK_VH_LU')">OPEN PORTAL</button>
            </div>

            <div class="how-item">
                <p style="font-size:12px; font-weight:700;"><i class="fab fa-windows"></i> Windows PC</p>
                <button class="action-btn btn-copy" onclick="copy('IP_ANDA')">COPY HOST</button>
            </div>
        </div>

        <!-- 4. Community -->
        <div class="card">
            <span class="tag"><i class="fas fa-users"></i> Community Axel</span>
            <a href="LINK_WA" class="soc-row">
                <div style="display:flex; align-items:center; gap:12px;"><i class="fab fa-whatsapp" style="font-size:24px;"></i> <b>WhatsApp</b></div>
                <i class="fas fa-arrow-right"></i>
            </a>
            <a href="https://discord.gg/HDt7eDFqsq" class="soc-row">
                <div style="display:flex; align-items:center; gap:12px;"><i class="fab fa-discord" style="font-size:24px;"></i> <b>Discord</b></div>
                <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    </div>

    <script>
        async function update() {
            try {
                const r = await fetch('https://api.gtps.cloud/api/server/public/2934');
                const d = await r.json();
                document.getElementById('onVal').innerText = d.onlineCount || 0;
                const l = document.getElementById('stLabel');
                if(d.online) { l.innerText="SYSTEM ACTIVE"; l.style.color="#00ff88"; }
                else { l.innerText="OFFLINE"; l.style.color="#ff0000"; }
            } catch(e){}
        }
        setInterval(update, 5000); update();

        const a = document.getElementById("bgMusic");
        const i = document.getElementById("mIco");
        function toggleM() {
            if(a.paused) { a.play(); i.className="fas fa-pause"; }
            else { a.pause(); i.className="fas fa-play"; }
        }
        function copy(t) { navigator.clipboard.writeText(t); alert("Host Copied!"); }
        document.addEventListener('click', () => { if(a.paused){a.play(); i.className="fas fa-pause";} }, {once:true});
    </script>
</body>
</html>
