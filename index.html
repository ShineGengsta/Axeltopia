<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>PRIVATE SERVER - WEBSITE | PANEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* CSS tetap sama sesuai permintaan (tidak diubah) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #0a0a0a; --surface: #121212; --surface2: #1c1c1c; --surface3: #262626; --border: rgba(255, 255, 255, 0.1); --accent: #b0b0b0; --text: #f0f0f0; --text-dim: #a8a8b0; --text-faint: #707070; --success: #4ade80; --cpu: #fbbf24; --ram: #60a5fa; --storage: #4ade80; --purple: #c084fc; --yellow: #fbbf24; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 60% 40% at 20% 30%, rgba(176, 176, 176, 0.04) 0%, transparent 60%), radial-gradient(ellipse 50% 30% at 80% 70%, rgba(176, 176, 176, 0.02) 0%, transparent 60%); pointer-events: none; z-index: 0; }
        .noise { position: fixed; inset: 0; opacity: 0.02; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); background-size: 200px; pointer-events: none; z-index: 0; }
        #app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
        .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 32px; border-bottom: 1px solid var(--border); background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
        .topbar-logo img { height: 54px; width: auto; filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2)); transition: transform 0.1s ease; }
        .burger-btn { width: 42px; height: 42px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; z-index: 201; }
        .burger-line { width: 20px; height: 2px; background: var(--text-dim); border-radius: 2px; transition: all 0.2s; }
        .burger-menu { position: fixed; top: 74px; right: 24px; width: 270px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; box-shadow: 0 20px 35px rgba(0, 0, 0, 0.6); z-index: 200; overflow: hidden; transform: translateY(-8px) scale(0.96); opacity: 0; pointer-events: none; transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        .burger-menu.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }
        .burger-nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 14px; cursor: pointer; transition: all 0.15s; font-size: 15px; font-weight: 500; color: var(--text-dim); }
        .burger-nav-item.active { background: rgba(176, 176, 176, 0.12); color: var(--accent); }
        .page-container { flex: 1; padding: 28px 32px 40px; }
        .page { width: 100%; max-width: 1300px; margin: 0 auto; display: none; animation: fadeIn 0.25s ease; }
        .page.active { display: block; }
        .dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 24px 22px; backdrop-filter: blur(4px); box-shadow: 0 12px 28px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .status-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 18px; border-radius: 999px; font-weight: 600; font-size: 13px; }
        .status-online { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25); color: #4ade80; }
        .status-offline { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #f87171; }
        .metric-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
        .metric-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 16px; padding: 18px 14px; text-align: center; }
        .metric-value { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 800; }
        .progress-bar { height: 7px; background: var(--surface3); border-radius: 999px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 999px; transition: width 0.4s ease; }
        .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; text-align: center; }
        .cat-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 16px 10px; }
        .worlds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
        .world-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 8px; text-align: center; }
        .toast-simple { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface); border: 1px solid var(--border); border-radius: 40px; padding: 10px 24px; font-size: 13px; opacity: 0; transition: 0.2s; z-index: 999; }
        .toast-simple.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        @media (max-width:768px) { .page-container { padding: 14px 12px; } .metric-row { grid-template-columns: 1fr; } .dash-grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body oncontextmenu="return false">
<div class="noise"></div>
<div id="app">
    <div class="topbar">
        <div class="topbar-left">
            <div class="topbar-logo" id="logoHomeBtn"><img src="https://i.supaimg.com/b1224b0e-1436-4cd1-b440-a556cc6632e8/7906bfef-c563-4721-8a86-efde4be227c9.png" alt="ASPECTOPIA"></div>
        </div>
        <div class="topbar-right">
            <div class="burger-btn" id="burgerBtn" onclick="toggleBurger()">
                <div class="burger-line"></div><div class="burger-line"></div><div class="burger-line"></div>
            </div>
        </div>
    </div>
    <div class="burger-overlay" id="burgerOverlay" onclick="closeBurger()"></div>
    <div class="burger-menu" id="burgerMenu">
        <div class="burger-menu-header"><div class="burger-menu-user">ASPECTOPIA</div><div class="burger-menu-sub">private network · official</div></div>
        <div class="burger-nav">
            <div class="burger-nav-item active" id="nav-home" onclick="navTo('home')"><span>Home</span></div>
            <div class="burger-nav-item" id="nav-info" onclick="navTo('info')"><span>Info</span></div>
            <div class="burger-nav-item" id="nav-host" onclick="navTo('host')"><span>Host</span></div>
            <div class="burger-nav-item" id="nav-search" onclick="navTo('search')"><span>Search Item</span></div>
        </div>
    </div>

    <div class="page-container">
        <div class="page active" id="page-home">
            <div class="dash-card">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px;">
                    <div>
                        <h1 id="serverName" style="font-family:'Rajdhani';">ASPECTOPIA</h1>
                        <span class="badge-id" id="serverIdBadge">ID: 2934</span>
                        <span class="badge-ip" id="serverIP">91.134.85.13</span>
                    </div>
                    <div class="status-badge status-offline" id="statusContainer">
                        <span id="statusText">OFFLINE</span> <span id="playerCount"></span>
                    </div>
                </div>
            </div>
            
            <div class="metric-row">
                <div class="metric-box"><div class="metric-label">CPU</div><div class="metric-value" id="cpuUsage" style="color:var(--cpu)">0%</div></div>
                <div class="metric-box"><div class="metric-label">RAM</div><div class="metric-value" id="memoryUsage" style="color:var(--ram)">0 MB</div></div>
                <div class="metric-box"><div class="metric-label">ONLINE</div><div class="metric-value" id="onlineMetric" style="color:var(--success)">0</div></div>
            </div>

            <div class="dash-card">
                <h2><i class="fas fa-globe"></i> Worlds Online</h2>
                <div class="worlds-grid" id="worldsContainer">
                    <p style="color:var(--text-faint)">No worlds active.</p>
                </div>
            </div>
        </div>

        <div class="page" id="page-info"><div class="dash-card"><h2>Server Info</h2><p>Official Private Server AspexTopia.</p></div></div>
        
        <div class="page" id="page-host"><div class="dash-card"><h2>Connection</h2><p>IP: 91.134.85.13<br>Port: 17091</p></div></div>

        <div class="page" id="page-search">
            <div class="dash-card">
                <h2>Search Item</h2>
                <input type="text" id="itemIdInput" placeholder="Item ID..." style="padding:10px; border-radius:8px; width:100%; margin-bottom:10px; background:#1c1c1c; border:1px solid #333; color:white;">
                <button onclick="searchItem()" style="padding:10px 20px; background:var(--success); border:none; border-radius:8px; cursor:pointer;">Search</button>
                <div id="itemResult" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>
    <div id="toastCopy" class="toast-simple"></div>
</div>

<script>
    const SERVER_ID = '2934';
    const API_BASE = 'https://api.gtps.cloud/api/server/public/' + SERVER_ID;
    const API_STATUS = 'https://api.gtps.cloud/g-api/' + SERVER_ID + '/status';
    const API_WORLDS = 'https://api.gtps.cloud/g-api/' + SERVER_ID + '/worlds';

    async function updateDashboard() {
        try {
            const [resMain, resStatus, resWorlds] = await Promise.all([
                fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(API_BASE)).then(r => r.json()),
                fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(API_STATUS)).then(r => r.json()),
                fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(API_WORLDS)).then(r => r.json())
            ]);

            const main = JSON.parse(resMain.contents);
            const statusStr = resStatus.contents.toLowerCase();
            const worldsData = JSON.parse(resWorlds.contents);

            // Update Status & Player
            const isOnline = statusStr.includes('online') || (main && main.online > 0);
            const players = main ? main.online : 0;
            
            const statusDiv = document.getElementById('statusContainer');
            document.getElementById('statusText').innerText = isOnline ? 'ONLINE' : 'OFFLINE';
            document.getElementById('playerCount').innerText = isOnline ? `(${players})` : '';
            statusDiv.className = isOnline ? 'status-badge status-online' : 'status-badge status-offline';
            document.getElementById('onlineMetric').innerText = players;

            // Update Metrics (CPU/RAM)
            if(main) {
                document.getElementById('cpuUsage').innerText = (main.cpu || 0) + '%';
                document.getElementById('memoryUsage').innerText = (main.ram || 0) + ' MB';
            }

            // Update Worlds
            if(worldsData && worldsData.worlds) {
                let html = '';
                worldsData.worlds.slice(0, 20).forEach(w => {
                    html += `<div class="world-card"><div style="font-size:12px;">${w.name}</div><div style="font-size:10px;color:var(--success)">${w.players} Players</div></div>`;
                });
                document.getElementById('worldsContainer').innerHTML = html || '<p>No players in worlds.</p>';
            }

        } catch (e) {
            console.error("API Error", e);
        }
    }

    function searchItem() {
        const id = document.getElementById('itemIdInput').value;
        const res = document.getElementById('itemResult');
        if(!id) return;
        res.innerHTML = `<img src="https://api.gtps.cloud/api/item/texture/${SERVER_ID}/${id}" style="max-width:100px; border:1px solid #333; padding:5px;">`;
    }

    function toggleBurger() { document.getElementById('burgerMenu').classList.toggle('open'); }
    function closeBurger() { document.getElementById('burgerMenu').classList.remove('open'); }
    function navTo(p) {
        closeBurger();
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
    }

    setInterval(updateDashboard, 15000);
    updateDashboard();
</script>
</body>
</html>
