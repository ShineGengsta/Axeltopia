<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#b0e0e6">
    <title>GTPS | Private Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Warna request: 176, 224, 230 (PowderBlue) */
            --primary: rgba(176, 224, 230, 1);
            --primary-glow: rgba(176, 224, 230, 0.4);
            --bg-dark: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to bottom, #1e293b 0%, #0f172a 100%);
            color: #f1f5f9;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Efek Cahaya Latar Belakang */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top, var(--primary-glow) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
            position: relative;
            z-index: 1;
        }

        /* Animasi */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeInScale 0.8s ease-out forwards;
        }

        .logo-small {
            width: 120px;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px var(--primary-glow));
        }

        .game-title-img {
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
            display: block;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        /* Section Glassmorphism */
        .section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid var(--primary);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.8s ease-out forwards;
        }

        /* Status API Section */
        .status-card {
            text-align: center;
            background: rgba(176, 224, 230, 0.1);
            border-radius: 15px;
            padding: 1rem;
            border: 1px dashed var(--primary);
            margin-bottom: 1.5rem;
        }

        .status-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 1px;
            margin-bottom: 0.25rem;
        }

        /* Buttons Grid */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem;
            border-radius: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-main {
            grid-column: 1 / -1;
            background: var(--primary);
            color: #0f172a;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px var(--primary-glow);
        }

        .btn-sub {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .btn-sub:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Guide / How to Play Section */
        .guide-item {
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .platform-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            color: #0f172a;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .platform-info h4 {
            font-size: 0.9rem;
            color: var(--primary);
            text-transform: uppercase;
        }

        .platform-info p {
            font-size: 0.85rem;
            color: #cbd5e1;
        }

        /* Footer Social */
        .footer-social {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2rem;
            padding-bottom: 3rem;
        }

        .social-link {
            font-size: 2.5rem;
            color: white;
            transition: 0.3s;
        }

        .social-link.discord:hover { color: #5865F2; transform: scale(1.1); }
        .social-link.whatsapp:hover { color: #25D366; transform: scale(1.1); }

        @media (max-width: 480px) {
            .btn-grid { grid-template-columns: 1fr; }
            .game-title-img { max-width: 280px; }
        }
    </style>
</head>

<body>

    <div class="container">
        <header class="header">
            <img src="main_menu_bg_themed.png" alt="Icon" class="logo-small">
            <img src="game_title.png" alt="Game Title" class="game-title-img">
        </header>

        <main class="section">
            <img src="newget.png" alt="Promo" class="w-32 mx-auto mb-6 block rounded-lg">

            <div class="status-card">
                <div class="status-title">SERVER STATUS</div>
                <div id="gtps-api">
                    <span class="text-white font-medium">Online Players: </span>
                    <span id="player-count" class="text-blue-200 font-bold">0</span>
                </div>
            </div>

            <div class="mb-6">
                <h3 class="text-center font-bold mb-4" style="color: var(--primary)">HOW TO PLAY</h3>
                
                <div class="guide-item">
                    <div class="platform-icon"><i class="fab fa-android"></i></div>
                    <div class="platform-info">
                        <h4>Android</h4>
                        <p>ptunnel, Vhost</p>
                    </div>
                </div>

                <div class="guide-item">
                    <div class="platform-icon"><i class="fab fa-apple"></i></div>
                    <div class="platform-info">
                        <h4>iOS</h4>
                        <p>Surge5</p>
                    </div>
                </div>

                <div class="guide-item">
                    <div class="platform-icon"><i class="fas fa-desktop"></i></div>
                    <div class="platform-info">
                        <h4>Windows & Macs</h4>
                        <p>Coming Soon</p>
                    </div>
                </div>
            </div>

            <div class="btn-grid">
                <a href="#" class="btn btn-main">
                    <i class="fas fa-download"></i> DOWNLOAD GAME
                </a>
                <a href="#" class="btn btn-sub">
                    <i class="fas fa-user-plus"></i> REGISTER
                </a>
                <a href="#" class="btn btn-sub">
                    <i class="fas fa-store"></i> STORE
                </a>
            </div>
        </main>

        <div class="footer-social">
            <a href="LINK_DISCORD" class="social-link discord"><i class="fab fa-discord"></i></a>
            <a href="LINK_WA" class="social-link whatsapp"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>

    <script>
        // Di sini kamu bisa tambahkan fetch API GTPS Cloud kamu nantinya
        console.log("Website GTPS Ready!");
    </script>

</body>
</html>
