<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROWICE - GTPS Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: rgb(176, 224, 230); 
            --bg-body: rgb(176, 224, 230);
            --card-bg: #111111;
            --inner-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #888888;
            --accent-glow: rgba(176, 224, 230, 0.2);
        }

        body {
            background-color: var(--bg-body);
            margin: 0;
            padding: 20px 10px;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 480px;
            background-color: var(--card-bg);
            border: 2px solid var(--primary-color);
            border-radius: 30px;
            padding: 30px 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
        }

        .logo-box img { max-width: 220px; margin-bottom: 25px; }

        /* Status Card */
        .status-card {
            background: var(--inner-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .player-count { font-size: 40px; font-weight: 700; color: var(--primary-color); margin: 5px 0; }
        .status-badge { font-size: 12px; font-weight: bold; letter-spacing: 1px; color: #2ecc71; text-transform: uppercase; }

        /* Connection Hosts Section */
        .section-title {
            text-align: left;
            font-size: 18px;
            margin: 25px 0 15px 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .host-item {
            background: var(--inner-bg);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .host-item:hover { border-color: var(--primary-color); }

        .host-info { text-align: left; display: flex; flex-direction: column; }
        .host-name { font-weight: 600; font-size: 15px; }
        .host-platform { font-size: 12px; color: var(--text-dim); }

        .btn-action {
            background: #2a2a2a;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-action:hover { background: var(--primary-color); color: #000; }

        /* Community Links */
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .social-btn { padding: 12px; border-radius: 12px; text-decoration: none; color: white; font-weight: 600; font-size: 14px; transition: 0.3s; }
        .discord { background: #5865F2; }
        .whatsapp { background: #25D366; }

        /* Text Area for Hidden Copy */
        #copyHelper { position: absolute; left: -9999px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-box">
            <img src="game_title.png" alt="GROWICE Logo" onerror="this.src='https://via.placeholder.com/200x80?text=GROWICE'">
        </div>

        <div class="status-card">
            <div class="status-badge">● Live Status</div>
            <div id="online-players" class="player-count">0</div>
            <div style="color: var(--text-dim); font-size: 13px;">Players Online</div>
        </div>

        <div class="section-title">🔌 Connection Hosts</div>

        <div class="host-item">
            <div class="host-info">
                <span class="host-name">PowerTunnel</span>
                <span class="host-platform">Android</span>
            </div>
            <a href="https://gtpshost.com/d/AspexTopia" target="_blank" class="btn-action">Copy</a>
        </div>

        <div class="host-item">
            <div class="host-info">
                <span class="host-name">Surge 5</span>
                <span class="host-platform">iOS</span>
            </div>
            <a href="https://gtpshost.com/ios/AspexTopia" target="_blank" class="btn-action">Copy</a>
        </div>

        <div class="host-item">
            <div class="host-info">
                <span class="host-name">Virtual Host</span>
                <span class="host-platform">Android / PC</span>
            </div>
            <a href="LINK_MEDIAFIRE_VIRTUAL_HOST_KAMU" target="_blank" class="btn-action">Download</a>
        </div>

        <div class="host-item">
            <div class="host-info">
                <span class="host-name">PC Hosts</span>
                <span class="host-platform">Windows / MacOS</span>
            </div>
            <button class="btn-action" onclick="copyHosts()">Copy</button>
        </div>

        <div class="host-item">
            <div class="host-info">
                <span class="host-name">AspexTopia APK</span>
                <span class="host-platform">Android (Custom Client)</span>
            </div>
            <a href="LINK_MEDIAFIRE_APK_KAMU" target="_blank" class="btn-action">Download</a>
        </div>

        <div class="section-title">👥 Community</div>
        <div class="social-grid">
            <a href="LINK_DISCORD" class="social-btn discord">Discord</a>
            <a href="LINK_WA" class="social-btn whatsapp">WhatsApp</a>
        </div>

        <p style="margin-top: 30px; font-size: 10px; color: #444;">&copy; 2024 GROWICE - SERVER ID: 2934</p>
    </div>

    <textarea id="copyHelper"></textarea>

    <script>
        // Fungsi Copy untuk Windows/Mac Hosts
        function copyHosts() {
            const hostText = `91.134.85.13 growtopia1.com\n91.134.85.13 growtopia2.com\n91.134.85.13 www.growtopia1.com\n91.134.85.13 www.growtopia2.com`;
            const helper = document.getElementById('copyHelper');
            helper.value = hostText;
            helper.select();
            document.execCommand('copy');
            alert('Hosts berhasil disalin untuk PC!');
        }

        // Fetch Data Player
        async function fetchStats() {
            try {
                const response = await fetch('https://api.gtps.cloud/server/2934');
                const data = await response.json();
                if(data.success) {
                    document.getElementById('online-players').innerText = data.server.onlinePlayers || 0;
                }
            } catch (e) { console.log("API Error"); }
        }

        fetchStats();
        setInterval(fetchStats, 30000);
    </script>
</body>
</html>
