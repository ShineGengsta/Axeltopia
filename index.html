<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AspexTopia | Official Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #bc13fe;
            --secondary: #ff0055;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Overlay Enter */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: 0.8s;
        }

        /* Background Animate */
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a0033 0%, #050505 100%);
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 450px;
            margin: 40px auto;
            padding-bottom: 80px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 25px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(188, 19, 254, 0.5);
        }

        /* Music Floating Button */
        #music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 15px var(--primary);
            z-index: 100;
        }

        /* Status & Online */
        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 16px;
            border-radius: 50px;
            margin-top: 15px;
        }

        #status-dot { height: 10px; width: 10px; border-radius: 50%; margin-right: 10px; }
        .online { background: #00ff88; box-shadow: 0 0 15px #00ff88; }
        .offline { background: #ff0055; box-shadow: 0 0 15px #ff0055; }

        /* Staff Style */
        .staff-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(188, 19, 254, 0.2);
            padding: 15px;
            border-radius: 15px;
            margin-top: 5px;
        }
        .vip { border-color: gold; }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            display: block;
            margin-bottom: 12px;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
        }
        .btn-download { background: linear-gradient(45deg, var(--primary), #7b2ff7); color: white; }
        .btn-discord { border: 1px solid var(--primary); color: white; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 style="font-family: 'Orbitron'; margin-bottom: 20px;">ASPEXTOPIA</h2>
        <button onclick="startPortal()" class="btn btn-download" style="width: 200px;">ENTER PORTAL</button>
    </div>

    <div class="bg-animate"></div>

    <audio id="myAudio" loop>
        <source src="https://www.image2url.com/r2/default/audio/1777973249472-c81569ed-a538-497b-87cb-ad7b22e6ed7f.m4a" type="audio/mp4">
    </audio>

    <div id="music-control" onclick="toggleMusic()">
        <span id="music-icon">🎵</span>
    </div>

    <div class="container">
        <div class="glass-card">
            <h1 class="logo-text">ASPEXTOPIA</h1>
            <div class="status-badge">
                <div id="status-dot" class="offline"></div>
                <span id="status-text" style="font-weight: bold;">CONNECTING</span>
            </div>
            <p style="margin-top: 15px; font-size: 1.2rem;">ONLINE: <span id="online-count" style="color: var(--primary);">0</span></p>
        </div>

        <div class="glass-card">
            <h2 style="color: var(--primary); letter-spacing: 3px; font-size: 0.9rem; margin-bottom: 20px;">HIERARCHY</h2>
            <div style="margin-bottom: 15px;">
                <small style="opacity: 0.5;">FOUNDER OF ASPEX</small>
                <div class="staff-card vip">
                    <p style="font-family: 'Orbitron';">SHINE</p>
                    <p style="color: #7289da; font-size: 0.8rem;">@shinegengsta</p>
                </div>
            </div>
            <div style="margin-bottom: 15px;">
                <small style="opacity: 0.5;">CO FOUNDER ASPEX</small>
                <div class="staff-card">- | -</div>
            </div>
            <div>
                <small style="opacity: 0.5;">STAFF OF ASPEX</small>
                <div class="staff-card">- | -</div>
            </div>
        </div>

        <div class="action">
            <a href="#" class="btn btn-download">DOWNLOAD CLIENT</a>
            <a href="#" class="btn btn-discord">JOIN DISCORD</a>
        </div>
    </div>

    <script>
        const audio = document.getElementById("myAudio");
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        const count = document.getElementById('online-count');

        function startPortal() {
            document.getElementById("overlay").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("overlay").style.display = "none";
                audio.play();
            }, 800);
        }

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                document.getElementById("music-icon").innerText = "🎵";
            } else {
                audio.pause();
                document.getElementById("music-icon").innerText = "🔇";
            }
        }

        async function updateStatus() {
            try {
                const response = await fetch('https://api.gtps.cloud/server/2934');
                const data = await response.json();
                if (data.status === "online") {
                    dot.className = 'online';
                    text.innerText = "RUNNING";
                    text.style.color = "#00ff88";
                    count.innerText = data.players || 0;
                } else {
                    dot.className = 'offline';
                    text.innerText = "OFFLINE";
                    text.style.color = "#ff0055";
                    count.innerText = "0";
                }
            } catch (err) {
                text.innerText = "API ERROR";
            }
        }

        setInterval(updateStatus, 1000);
        updateStatus();
    </script>
</body>
</html>
