<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AspexTopia | Official Website </title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: rgba(173, 216, 230, 0.9);
            --primary-dim: rgba(173, 216, 230, 0.1);
            --bg-dark: #050505;
            --glass-card-bg: rgba(15, 15, 15, 0.9);
            --border: rgba(173, 216, 230, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: 0.8s;
            backdrop-filter: blur(20px);
        }

        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a1b2e 0%, #050505 100%);
            z-index: -1;
        }

        .container {
            width: 92%;
            max-width: 480px;
            margin: 40px auto;
            padding-bottom: 100px;
        }

        .glass-card {
            background: var(--glass-card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        .main-header { text-align: center; border-bottom: 3px solid var(--primary); }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(173, 216, 230, 0.4);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 50px;
            margin-top: 15px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        #status-dot { height: 12px; width: 12px; border-radius: 50%; margin-right: 12px; }
        .dot-online { background: #00ff88; box-shadow: 0 0 15px #00ff88; }
        .dot-offline { background: #ff0055; box-shadow: 0 0 15px #ff0055; }
        .dot-maintenance { background: #ffaa00; box-shadow: 0 0 15px #ffaa00; }

        .section-title {
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 5px;
            color: var(--primary);
            margin-bottom: 25px;
            text-align: left;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon-box {
            width: 45px; height: 45px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            flex-shrink: 0;
        }
        .icon-box svg { width: 22px; height: 22px; fill: #fff; opacity: 0.8; }

        .htp-item {
            background: rgba(30, 30, 30, 0.4);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: 0.3s;
        }

        .htp-info { flex-grow: 1; text-align: left; }
        .htp-main { font-weight: 700; font-size: 1.05rem; color: #fff; }
        .htp-sub { font-size: 0.8rem; color: rgba(255, 255, 255, 0.4); }

        .htp-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            display: flex; align-items: center; gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: 0.3s;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 15px;
        }
        .btn-download { background: linear-gradient(135deg, var(--primary), #fff); color: #000; }
        
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-social { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); color: #fff; font-size: 0.85rem; }

        #music-control {
            position: fixed; bottom: 25px; right: 25px;
            background: var(--primary); width: 55px; height: 55px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 100;
        }

        #toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 12px 28px;
            border-radius: 12px; font-weight: bold; opacity: 0; transition: 0.4s; z-index: 1000;
        }
        #toast.show { opacity: 1; top: 40px; }
    </style>
</head>
<body>

    <script>
        const API_URL = 'https://api.gtps.cloud/g-api/[20034]/status';
        const audio = document.getElementById("myAudio");
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        const count = document.getElementById('online-count');
        const toast = document.getElementById('toast');

        function startPortal() {
            document.getElementById("overlay").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("overlay").style.display = "none";
                audio.play().catch(() => {});
            }, 800);
        }

        function toggleMusic() {
            if (audio.paused) { audio.play(); document.getElementById("music-icon").innerText = "🎵"; }
            else { audio.pause(); document.getElementById("music-icon").innerText = "🔇"; }
        }

        function copyText(val) {
            navigator.clipboard.writeText(val).then(() => {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        }

        async function updateStatus() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (data.status === "online") {
                    dot.className = 'dot-online';
                    text.innerText = "ONLINE";
                    text.style.color = "#00ff88";
                    count.innerText = data.players || 0;
                } else if (data.status === "maintenance") {
                    dot.className = 'dot-maintenance';
                    text.innerText = "MAINTENANCE";
                    text.style.color = "#ffaa00";
                    count.innerText = "0";
                } else {
                    dot.className = 'dot-offline';
                    text.innerText = "OFFLINE";
                    text.style.color = "#ff0055";
                    count.innerText = "0";
                }
            } catch (err) { 
                text.innerText = "OFFLINE"; 
                dot.className = 'dot-offline';
            }
        }

        // REFRESH SET TO 1 SECOND (1000ms)
        setInterval(updateStatus, 1000);
        updateStatus();
    </script>
