<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AspexTopia | Official Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Biru Muda Transparan Pro */
            --primary: rgba(173, 216, 230, 0.9);
            --primary-dim: rgba(173, 216, 230, 0.1);
            --bg-dark: #050505;
            --glass-card-bg: rgba(15, 15, 15, 0.85);
            --border: rgba(173, 216, 230, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background: var(--bg-blue);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-blue);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: 0.8s;
            backdrop-filter: blur(20px);
        }

        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a1b2e 0%, #050505 100%);
            z-index: -1;
        }

        .container {
            width: 92%;
            max-width: 480px;
            margin: 40px auto;
            padding-bottom: 100px;
        }

        .glass-card {
            background: var(--glass-card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        .main-header { text-align: center; border-bottom: 3px solid var(--primary); }

        .logo-img {
            max-width: 280px;
            width: 200%;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(173, 216, 230, 0.3));
            margin-bottom: 10px;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(173, 216, 230, 0.3);
        }

        /* Server Stats Bulat */
        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 50px;
            margin-top: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #status-dot {
            height: 12px; width: 12px; border-radius: 50%;
            margin-right: 10px;
            transition: 0.5s;
        }
        .dot-online { background: #00ff88; box-shadow: 0 0 15px #00ff88; }
        .dot-offline { background: #ff0055; box-shadow: 0 0 15px #ff0055; }
        .dot-maintenance { background: #ffaa00; box-shadow: 0 0 15px #ffaa00; }

        .section-title {
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: var(--primary);
            margin-bottom: 25px;
            text-align: center;
            font-weight: 700;
        }

        /* Staff Row */
        .staff-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        .vip { border-color: gold !important; }

        /* How To Play Item dengan Ikon */
        .htp-item {
            background: rgba(20, 20, 20, 0.8);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .htp-icon-box {
            background: rgba(255, 255, 255, 0.05);
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            flex-shrink: 0;
        }
        
        .htp-icon-box svg { width: 22px; height: 22px; fill: white; }

        .htp-text { text-align: left; flex-grow: 1; }
        .htp-main { font-weight: 600; font-size: 1rem; color: white; }
        .htp-sub { font-size: 0.75rem; opacity: 0.5; }

        .htp-btn {
            background: var(--primary-dim);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }

        /* Buttons Area */
        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 12px;
        }
        .btn-download { background: linear-gradient(45deg, var(--primary), #fff); color: #000; }
        
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-social { background: transparent; border: 2px solid var(--primary); color: var(--primary); font-size: 0.8rem; }
        .btn-wa { border-color: #25d366; color: #25d366; }
        .btn-discord { border-color: #7289da; color: #7289da; }

        #music-control {
            position: fixed; bottom: 25px; right: 25px;
            background: var(--primary); width: 50px; height: 50px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 100;
        }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: #000; padding: 12px 24px;
            border-radius: 50px; font-weight: bold; opacity: 0; transition: 0.3s;
        }
        #toast.show { opacity: 1; top: 30px; }
    </style>
</head>
<body>

                <div class="htp-text">
                    <div class="htp-main">iOS</div>
                    <div class="htp-sub">iPhone / iPad</div>
                </div>
                <button class="htp-btn" onclick="copyText('https://gtpshost.com/ios/AspexTopia')">Copy Link</button>
            </div>

            <div class="htp-item">
                <div class="htp-icon-box">

        <div class="action-area">
            <a href="#" class="btn btn-download">Download APK (COMMING SOON)</a>

                <a href="https://discord.gg/MS2EgbCqM" target="_blank" class="btn btn-social btn-discord">Discord Server</a>
                <a href="https://chat.whatsapp.com/CcuA7DNdp6bDbT8k3aEdpV" target="_blank" class="btn btn-social btn-wa">WhatsApp Group</a>

    <script>
        const API_URL = 'https://api.gtps.cloud/g-api/2934/status';
        const audio = document.getElementById("myAudio");
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        const count = document.getElementById('online-count');
        const toast = document.getElementById('toast');

        function startPortal() {
            document.getElementById("overlay").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("overlay").style.display = "none";
                audio.play();
            }, 800);
        }

        function toggleMusic() {
            if (audio.paused) { audio.play(); document.getElementById("music-icon").innerText = "🔊"; }
            else { audio.pause(); document.getElementById("music-icon").innerText = "🔇"; }
        }

        function copyText(val) {
            navigator.clipboard.writeText(val).then(() => {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        }

        async function updateStatus() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (data.status === "online") {
                    dot.className = 'dot-online';
                    text.innerText = "ONLINE";
                    text.style.color = "#00ff88";
                    count.innerText = data.players || 0;
                } else if (data.status === "maintenance") {
                    dot.className = 'dot-maintenance';
                    text.innerText = "MAINTENANCE";
                    text.style.color = "#ffaa00";
                    count.innerText = "0";
                } else {
                    dot.className = 'dot-offline';
                    text.innerText = "OFFLINE";
                    text.style.color = "#ff0055";
                    count.innerText = "0";
                }
            } catch (err) { 
                text.innerText = "ONLINE"; 
                dot.className = 'dot-online';
                text.innerText = "OFFLINE";
                dot.className = 'dot-offline';
                text.innerText = "MAINTANCE";
                dot.className = 'dot-maintance';
            }
        }
        
        setInterval(updateStatus, 1);
        updateStatus();
    </script>
